{% extends "store/base.html" %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<h1>{{ title }}</h1>
<form method="post">
    {% csrf_token %}
    {% if form.non_field_errors %}
    <div style="color: red;">
        {% for error in form.non_field_errors %}
        <p>{{ error }}</p>
        {% endfor %}
    </div>
    {% endif %}
    {{ form.as_p }}
    <button type="submit">Save</button>
</form>
{% endblock %}
